# Reusable Elixir Test Workflow
# Internal building block for .github/workflows/jido-ci.yml.
#
# Supports explicit pair matrix testing via test_matrix, with legacy
# otp_versions and elixir_versions cross-product fallback.

name: Elixir Test

on:
  workflow_call:
    inputs:
      otp_versions:
        description: 'Legacy JSON array of OTP versions for the test matrix fallback'
        required: false
        type: string
        default: '["27", "28"]'
      elixir_versions:
        description: 'Legacy JSON array of Elixir versions for the test matrix fallback'
        required: false
        type: string
        default: '["1.18", "1.19"]'
      test_matrix:
        description: 'JSON array of explicit required test matrix pairs'
        required: false
        type: string
        default: ''
      experimental_compile_elixir_versions:
        description: 'JSON array of optional exact compile-only Elixir versions that are allowed to fail'
        required: false
        type: string
        default: '[]'
      experimental_compile_otp_versions:
        description: 'Optional JSON array of OTP versions for experimental compile-only checks; defaults to otp_versions'
        required: false
        type: string
        default: '[]'
      experimental_compile_otp_name:
        description: 'Optional display label for experimental compile OTP versions; defaults to the exact OTP version'
        required: false
        type: string
        default: '29'
      mix_env:
        description: 'MIX_ENV for tests'
        required: false
        type: string
        default: 'test'
      test_setup_command:
        description: 'Optional command to run before tests'
        required: false
        type: string
        default: ''
      test_command:
        description: 'Command to run tests'
        required: false
        type: string
        default: 'mix test'
      workflow_platform_repository:
        description: 'Internal workflow platform repository'
        required: true
        type: string
      workflow_platform_ref:
        description: 'Internal workflow platform ref'
        required: true
        type: string
      workflow_platform_path:
        description: 'Checkout path for the internal workflow platform'
        required: false
        type: string
        default: '.github-actions-platform'

jobs:
  resolve-test-matrix:
    name: Resolve Test Matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    permissions:
      contents: read

    outputs:
      test_matrix: ${{ steps.matrix.outputs.test_matrix }}

    steps:
      - name: Resolve required test matrix
        id: matrix
        shell: bash
        env:
          TEST_MATRIX: ${{ inputs.test_matrix }}
          OTP_VERSIONS: ${{ inputs.otp_versions }}
          ELIXIR_VERSIONS: ${{ inputs.elixir_versions }}
        run: |
          set -euo pipefail

          if [ -n "$TEST_MATRIX" ] && [ "$TEST_MATRIX" != "[]" ]; then
            matrix="$(jq -c . <<< "$TEST_MATRIX")"
          elif [ "$OTP_VERSIONS" = '["27", "28"]' ] && [ "$ELIXIR_VERSIONS" = '["1.18", "1.19"]' ]; then
            matrix='[{"otp":"27","elixir":"1.18"},{"otp":"28","elixir":"1.18"},{"otp":"28","elixir":"1.19"},{"otp":"29","elixir":"1.20"}]'
          else
            matrix="$(jq -cn \
              --argjson otps "$OTP_VERSIONS" \
              --argjson elixirs "$ELIXIR_VERSIONS" \
              '[ $otps[] as $otp | $elixirs[] as $elixir | {otp: $otp, elixir: $elixir} ]')"
          fi

          echo "test_matrix=$matrix" >> "$GITHUB_OUTPUT"

  test:
    name: ${{ matrix.otp }} - ${{ matrix.elixir }}
    needs: resolve-test-matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-test-matrix.outputs.test_matrix) }}

    env:
      MIX_ENV: ${{ inputs.mix_env }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout workflow platform
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.workflow_platform_repository }}
          ref: ${{ inputs.workflow_platform_ref }}
          path: ${{ inputs.workflow_platform_path }}

      - name: Setup Elixir
        uses: ./.github-actions-platform/.github/actions/setup-beam
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Restore caches
        id: deps-cache
        uses: ./.github-actions-platform/.github/actions/restore-mix-cache
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}
          mix-env: ${{ inputs.mix_env }}

      - name: Bootstrap Mix
        uses: ./.github-actions-platform/.github/actions/bootstrap-mix

      - name: Install dependencies
        uses: ./.github-actions-platform/.github/actions/install-deps
        with:
          mix-env: ${{ inputs.mix_env }}
          deps-cache-hit: ${{ steps.deps-cache.outputs.deps-cache-hit }}

      - name: Compile project
        shell: bash
        run: |
          set -euo pipefail
          mix compile --warnings-as-errors

      - name: Run test setup
        if: ${{ inputs.test_setup_command != '' }}
        shell: bash
        env:
          TEST_SETUP_COMMAND: ${{ inputs.test_setup_command }}
        run: |
          set -euo pipefail
          bash -lc "$TEST_SETUP_COMMAND"

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          ${{ inputs.test_command }}

  experimental-compile:
    # Keep this name static so skipped jobs do not render unresolved matrix expressions.
    name: Experimental Compile
    if: ${{ inputs.experimental_compile_elixir_versions != '' && inputs.experimental_compile_elixir_versions != '[]' }}
    continue-on-error: true
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        otp: ${{ fromJson(inputs.experimental_compile_otp_versions != '' && inputs.experimental_compile_otp_versions || inputs.otp_versions) }}
        elixir: ${{ fromJson(inputs.experimental_compile_elixir_versions) }}

    env:
      MIX_ENV: ${{ inputs.mix_env }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout workflow platform
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.workflow_platform_repository }}
          ref: ${{ inputs.workflow_platform_ref }}
          path: ${{ inputs.workflow_platform_path }}

      - name: Setup Elixir
        uses: ./.github-actions-platform/.github/actions/setup-beam
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}
          version-type: strict

      - name: Restore caches
        id: deps-cache
        uses: ./.github-actions-platform/.github/actions/restore-mix-cache
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}
          mix-env: ${{ inputs.mix_env }}

      - name: Bootstrap Mix
        uses: ./.github-actions-platform/.github/actions/bootstrap-mix

      - name: Install dependencies
        uses: ./.github-actions-platform/.github/actions/install-deps
        with:
          mix-env: ${{ inputs.mix_env }}
          deps-cache-hit: ${{ steps.deps-cache.outputs.deps-cache-hit }}

      - name: Compile project
        id: compile
        shell: bash
        run: |
          set +e
          mix compile --warnings-as-errors
          status="$?"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "::warning::Experimental compile failed for Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}."
          fi
          exit 0

      - name: Experimental compile summary
        if: always()
        env:
          EXPERIMENTAL_COMPILE_OTP_NAME: ${{ inputs.experimental_compile_otp_name }}
          EXPERIMENTAL_COMPILE_STATUS: ${{ steps.compile.outputs.status }}
        run: |
          echo "### Experimental compile lane" >> "$GITHUB_STEP_SUMMARY"
          echo "- Elixir: ${{ matrix.elixir }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- OTP: ${{ matrix.otp }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$EXPERIMENTAL_COMPILE_OTP_NAME" ]; then
            echo "- OTP label: $EXPERIMENTAL_COMPILE_OTP_NAME" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$EXPERIMENTAL_COMPILE_STATUS" = "0" ]; then
            echo "- Result: passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Result: failed (warning only)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Blocking: no" >> "$GITHUB_STEP_SUMMARY"
