# Reusable Elixir Test Workflow
# Usage: uses: agentjido/github-actions/.github/workflows/elixir-test.yml@main
#
# Supports version matrix testing via otp_versions and elixir_versions inputs (JSON arrays)

name: Elixir Test

on:
  workflow_call:
    inputs:
      otp_versions:
        description: 'JSON array of OTP versions'
        required: false
        type: string
        default: '["27", "28"]'
      elixir_versions:
        description: 'JSON array of Elixir versions'
        required: false
        type: string
        default: '["1.18", "1.19"]'
      experimental_compile_elixir_versions:
        description: 'JSON array of optional exact compile-only Elixir versions that are allowed to fail'
        required: false
        type: string
        default: '[]'
      experimental_compile_otp_versions:
        description: 'Optional JSON array of OTP versions for experimental compile-only checks; defaults to otp_versions'
        required: false
        type: string
        default: ''
      experimental_compile_otp_name:
        description: 'Optional display label for experimental compile OTP versions; defaults to the exact OTP version'
        required: false
        type: string
        default: ''
      mix_env:
        description: 'MIX_ENV for tests'
        required: false
        type: string
        default: 'test'
      test_command:
        description: 'Command to run tests'
        required: false
        type: string
        default: 'mix test'
      postgres:
        description: 'Enable PostgreSQL service'
        required: false
        type: boolean
        default: false
      postgres_image:
        description: 'PostgreSQL Docker image'
        required: false
        type: string
        default: 'postgres:16-alpine'
      db_setup_command:
        description: 'Optional command to prepare the database before tests'
        required: false
        type: string
        default: 'mix ecto.setup'
      database_url:
        description: 'Optional explicit DATABASE_URL for db_setup_command'
        required: false
        type: string
        default: ''

jobs:
  test:
    name: ${{ matrix.otp }} - ${{ matrix.elixir }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        otp: ${{ fromJson(inputs.otp_versions) }}
        elixir: ${{ fromJson(inputs.elixir_versions) }}

    services:
      postgres:
        image: ${{ inputs.postgres && inputs.postgres_image || '' }}
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      MIX_ENV: ${{ inputs.mix_env }}
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_db

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve workflow platform ref
        id: platform-ref
        shell: bash
        run: |
          set -euo pipefail
          workflow_ref='${{ github.workflow_ref }}'
          echo "repository=${workflow_ref%%/.github/workflows/*}" >> "$GITHUB_OUTPUT"
          echo "ref=${workflow_ref#*@}" >> "$GITHUB_OUTPUT"

      - name: Checkout workflow platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.platform-ref.outputs.repository }}
          ref: ${{ steps.platform-ref.outputs.ref }}
          path: .github-actions-platform

      - name: Setup Elixir
        uses: ./.github-actions-platform/.github/actions/setup-beam
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Restore caches
        id: deps-cache
        uses: ./.github-actions-platform/.github/actions/restore-mix-cache
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}
          mix-env: ${{ inputs.mix_env }}

      - name: Bootstrap Mix
        uses: ./.github-actions-platform/.github/actions/bootstrap-mix

      - name: Install dependencies
        uses: ./.github-actions-platform/.github/actions/install-deps
        with:
          mix-env: ${{ inputs.mix_env }}
          deps-cache-hit: ${{ steps.deps-cache.outputs.deps-cache-hit }}

      - name: Compile project
        shell: bash
        run: |
          set -euo pipefail
          mix compile --warnings-as-errors

      - name: Setup database
        if: ${{ inputs.postgres && inputs.db_setup_command != '' }}
        shell: bash
        env:
          DATABASE_URL: ${{ inputs.database_url }}
          DB_SETUP_COMMAND: ${{ inputs.db_setup_command }}
        run: |
          set -euo pipefail
          if [ -z "$DATABASE_URL" ]; then
            export DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"
          fi
          bash -lc "$DB_SETUP_COMMAND"

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          ${{ inputs.test_command }}

  experimental-compile:
    # GitHub check rendering misformats conditional fallback expressions in reusable workflow job names.
    name: ${{ matrix.otp }} - ${{ matrix.elixir }} (experimental compile)
    if: ${{ inputs.experimental_compile_elixir_versions != '' && inputs.experimental_compile_elixir_versions != '[]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    continue-on-error: true

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        otp: ${{ fromJson(inputs.experimental_compile_otp_versions != '' && inputs.experimental_compile_otp_versions || inputs.otp_versions) }}
        elixir: ${{ fromJson(inputs.experimental_compile_elixir_versions) }}

    env:
      MIX_ENV: ${{ inputs.mix_env }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve workflow platform ref
        id: platform-ref
        shell: bash
        run: |
          set -euo pipefail
          workflow_ref='${{ github.workflow_ref }}'
          echo "repository=${workflow_ref%%/.github/workflows/*}" >> "$GITHUB_OUTPUT"
          echo "ref=${workflow_ref#*@}" >> "$GITHUB_OUTPUT"

      - name: Checkout workflow platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.platform-ref.outputs.repository }}
          ref: ${{ steps.platform-ref.outputs.ref }}
          path: .github-actions-platform

      - name: Setup Elixir
        uses: ./.github-actions-platform/.github/actions/setup-beam
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}
          version-type: strict

      - name: Restore caches
        id: deps-cache
        uses: ./.github-actions-platform/.github/actions/restore-mix-cache
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}
          mix-env: ${{ inputs.mix_env }}

      - name: Bootstrap Mix
        uses: ./.github-actions-platform/.github/actions/bootstrap-mix

      - name: Install dependencies
        uses: ./.github-actions-platform/.github/actions/install-deps
        with:
          mix-env: ${{ inputs.mix_env }}
          deps-cache-hit: ${{ steps.deps-cache.outputs.deps-cache-hit }}

      - name: Compile project
        shell: bash
        run: |
          set -euo pipefail
          mix compile --warnings-as-errors

      - name: Experimental compile summary
        if: always()
        env:
          EXPERIMENTAL_COMPILE_OTP_NAME: ${{ inputs.experimental_compile_otp_name }}
        run: |
          echo "### Experimental compile lane" >> "$GITHUB_STEP_SUMMARY"
          echo "- Elixir: ${{ matrix.elixir }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- OTP: ${{ matrix.otp }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$EXPERIMENTAL_COMPILE_OTP_NAME" ]; then
            echo "- OTP label: $EXPERIMENTAL_COMPILE_OTP_NAME" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Blocking: no (job uses continue-on-error)" >> "$GITHUB_STEP_SUMMARY"
