# Reusable Elixir Release Workflow
# Usage: uses: agentjido/github-actions/.github/workflows/elixir-release.yml@main
#
# Requires: secrets: inherit in caller workflow
# Token: Uses GITHUB_TOKEN with contents:write permission
# If branch protection requires admin push, use a PAT instead

name: Elixir Release

on:
  workflow_call:
    inputs:
      otp_version:
        description: 'OTP version'
        required: false
        type: string
        default: '28'
      elixir_version:
        description: 'Elixir version'
        required: false
        type: string
        default: '1.18'
      mix_env:
        description: 'MIX_ENV for release'
        required: false
        type: string
        default: 'dev'
      release_command:
        description: 'Release command'
        required: false
        type: string
        default: 'mix git_ops.release --yes'
      version_override:
        description: 'Optional explicit bare SemVer override for git_ops.release (for example 1.2.3, not v1.2.3)'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Dry run (no git push, no tag, no GitHub release, no Hex publish)'
        required: false
        type: boolean
        default: false
      hex_dry_run:
        description: 'Hex dry run only (run all git/release steps, but skip actual Hex publish)'
        required: false
        type: boolean
        default: false
      skip_tests:
        description: 'Skip tests before release'
        required: false
        type: boolean
        default: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    concurrency:
      group: release-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ github.token }}

      - name: Disable git hooks
        run: git config core.hooksPath /dev/null

      - name: Fetch tags
        run: |
          git fetch --tags --force
          echo "Available tags:"
          git tag -l | tail -10

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ inputs.otp_version }}
          elixir-version: ${{ inputs.elixir_version }}

      - name: Restore Hex/Mix cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.hex
            ~/.mix
          key: ${{ runner.os }}-beamtools-otp${{ inputs.otp_version }}-elixir${{ inputs.elixir_version }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-beamtools-otp${{ inputs.otp_version }}-elixir${{ inputs.elixir_version }}-

      - name: Install Hex/Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Restore dependencies cache
        uses: actions/cache@v5
        id: deps-cache
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ inputs.mix_env }}-otp${{ inputs.otp_version }}-elixir${{ inputs.elixir_version }}-${{ hashFiles('mix.lock') }}

      - name: Remove cached rebar3 build artifacts in deps
        run: |
          if [ -d deps ]; then
            find deps -maxdepth 6 -type d \( -name _build -o -name .rebar3 \) -prune -exec rm -rf {} + || true
            find deps -maxdepth 6 -type f -name rebar3.crashdump -delete || true
          fi

      - name: Install dependencies
        run: |
          set -euo pipefail
          mix deps.get
          mix deps.compile
        env:
          MIX_ENV: ${{ inputs.mix_env }}

      - name: Run tests
        if: ${{ inputs.skip_tests != true }}
        run: |
          set -euo pipefail
          mix test

      - name: Run release
        id: release
        run: |
          set -euo pipefail

          run_release() {
            local escaped_args=""

            if [ "$#" -gt 0 ]; then
              printf -v escaped_args '%q ' "$@"
            fi

            bash -lc "${{ inputs.release_command }} ${escaped_args}"
          }

          if [ -n "$VERSION_OVERRIDE" ]; then
            echo "Using explicit version override: $VERSION_OVERRIDE"
          fi

          DRY_RUN_LOG=$(mktemp)
          trap 'rm -f "$DRY_RUN_LOG"' EXIT

          # Capture the dry-run output so we can inspect it without pipefail masking matches.
          if [ -n "$VERSION_OVERRIDE" ]; then
            if run_release --override "$VERSION_OVERRIDE" --dry-run >"$DRY_RUN_LOG" 2>&1; then
              DRY_RUN_STATUS=0
            else
              DRY_RUN_STATUS=$?
            fi
          elif run_release --dry-run >"$DRY_RUN_LOG" 2>&1; then
            DRY_RUN_STATUS=0
          else
            DRY_RUN_STATUS=$?
          fi

          cat "$DRY_RUN_LOG"

          # Check for releasable commits first (dry-run to detect "no changes")
          if [ -z "$VERSION_OVERRIDE" ] && grep -qE "(No changes since|No changes should result)" "$DRY_RUN_LOG"; then
            echo "No releasable commits found since last release"
            echo "skipped=true" >> $GITHUB_OUTPUT
            echo "### Skipped: No releasable commits" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$DRY_RUN_STATUS" -ne 0 ]; then
            exit "$DRY_RUN_STATUS"
          fi

          # Run the actual release (no output capture to avoid exit code issues)
          if [ -n "$VERSION_OVERRIDE" ]; then
            run_release --override "$VERSION_OVERRIDE"
          else
            run_release
          fi

          # Extract version from mix.exs after release (grep to avoid mix compilation output)
          VERSION="v$(grep -m1 '@version "' mix.exs | sed 's/.*"\(.*\)".*/\1/' || grep -m1 'version:' mix.exs | sed 's/.*"\(.*\)".*/\1/')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "skipped=false" >> $GITHUB_OUTPUT
          echo "### Version: $VERSION" >> "$GITHUB_STEP_SUMMARY"
        env:
          MIX_ENV: ${{ inputs.mix_env }}
          VERSION_OVERRIDE: ${{ inputs.version_override }}

      - name: Publish to Hex.pm
        if: steps.release.outputs.skipped != 'true'
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run }}" = "true" ] || [ "${{ inputs.hex_dry_run }}" = "true" ]; then
            echo "### Hex Dry Run - Would publish:" >> "$GITHUB_STEP_SUMMARY"
            mix hex.publish --dry-run
          else
            mix hex.publish --yes
            echo "### Published to Hex.pm" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Version: ${{ steps.release.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Push changes and tags
        if: steps.release.outputs.skipped != 'true' && inputs.dry_run != true
        run: |
          set -euo pipefail
          VERSION="${{ steps.release.outputs.version }}"
          git push --atomic origin HEAD "refs/tags/$VERSION"
          echo "Released version $VERSION"
          echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Create GitHub release
        if: steps.release.outputs.skipped != 'true' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.release.outputs.version }}"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "See [CHANGELOG.md](CHANGELOG.md) for details."

      - name: Release summary
        run: |
          if [ "${{ steps.release.outputs.skipped }}" == "true" ]; then
            echo "::notice::No releasable commits found since last release"
          elif [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "::notice::Dry run completed for ${{ steps.release.outputs.version }}"
          else
            echo "::notice::Successfully released ${{ steps.release.outputs.version }}"
          fi
