name: Elixir Release

on:
  workflow_call:
    secrets:
      HEX_API_KEY:
        required: false
      RELEASE_TOKEN:
        required: false
    inputs:
      otp_version:
        description: OTP version
        required: false
        type: string
        default: "28"
      elixir_version:
        description: Elixir version
        required: false
        type: string
        default: "1.18"
      mix_env:
        description: MIX_ENV for release preparation
        required: false
        type: string
        default: "dev"
      release_command:
        description: Release command
        required: false
        type: string
        default: "mix git_ops.release --yes"
      version_override:
        description: Optional bare SemVer override for git_ops.release
        required: false
        type: string
        default: ""
      preflight_command:
        description: Command run before the actual release step
        required: false
        type: string
        default: "mix hex.audit && mix test"
      db_setup_command:
        description: Optional database setup command for release preflight
        required: false
        type: string
        default: ""
      database_url:
        description: Optional explicit DATABASE_URL for release preflight
        required: false
        type: string
        default: ""
      release_push_mode:
        description: "Release push mode: direct or pull-request"
        required: false
        type: string
        default: "direct"
      release_notes_mode:
        description: "GitHub release notes mode: changelog or generated"
        required: false
        type: string
        default: "changelog"
      dry_run:
        description: Run the release flow without pushing, GitHub release creation, or Hex publish
        required: false
        type: boolean
        default: false
      hex_dry_run:
        description: Run the git release flow but perform a Hex dry run
        required: false
        type: boolean
        default: false
      skip_preflight:
        description: Skip the preflight command entirely
        required: false
        type: boolean
        default: false
      skip_tests:
        description: Backward-compatible alias for skipping preflight validation
        required: false
        type: boolean
        default: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    concurrency:
      group: release-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Validate release mode
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.release_push_mode }}" in
            pull-request|direct) ;;
            *)
              echo "::error::Unsupported release_push_mode: ${{ inputs.release_push_mode }}"
              exit 1
              ;;
          esac

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}

      - name: Resolve workflow platform ref
        id: platform-ref
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          run_json="$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}")"
          workflow_path="$(printf '%s' "$run_json" | jq -r '.referenced_workflows[0].path // empty')"
          workflow_ref="$(printf '%s' "$run_json" | jq -r '.referenced_workflows[0].ref // empty')"
          workflow_sha="$(printf '%s' "$run_json" | jq -r '.referenced_workflows[0].sha // empty')"
          if [ -z "$workflow_path" ]; then
            echo "::error::Unable to resolve the reusable workflow repository for run ${{ github.run_id }}."
            exit 1
          fi
          echo "repository=${workflow_path%%/.github/workflows/*}" >> "$GITHUB_OUTPUT"
          echo "ref=${workflow_ref:-$workflow_sha}" >> "$GITHUB_OUTPUT"

      - name: Checkout workflow platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.platform-ref.outputs.repository }}
          ref: ${{ steps.platform-ref.outputs.ref }}
          path: .github-actions-platform

      - name: Disable git hooks
        shell: bash
        run: git config core.hooksPath /dev/null

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Beam
        uses: ./.github-actions-platform/.github/actions/setup-beam
        with:
          otp-version: ${{ inputs.otp_version }}
          elixir-version: ${{ inputs.elixir_version }}

      - name: Restore caches
        id: cache
        uses: ./.github-actions-platform/.github/actions/restore-mix-cache
        with:
          otp-version: ${{ inputs.otp_version }}
          elixir-version: ${{ inputs.elixir_version }}
          mix-env: ${{ inputs.mix_env }}

      - name: Bootstrap Mix
        uses: ./.github-actions-platform/.github/actions/bootstrap-mix

      - name: Install dependencies
        uses: ./.github-actions-platform/.github/actions/install-deps
        with:
          mix-env: ${{ inputs.mix_env }}
          deps-cache-hit: ${{ steps.cache.outputs.deps-cache-hit }}

      - name: Prepare database for preflight
        if: ${{ inputs.db_setup_command != '' && inputs.skip_preflight != true && inputs.skip_tests != true }}
        shell: bash
        env:
          DATABASE_URL: ${{ inputs.database_url }}
          DB_SETUP_COMMAND: ${{ inputs.db_setup_command }}
        run: |
          set -euo pipefail
          if [ -n "$DATABASE_URL" ]; then
            export DATABASE_URL
          fi
          bash -lc "$DB_SETUP_COMMAND"

      - name: Run preflight checks
        if: ${{ inputs.skip_preflight != true && inputs.skip_tests != true }}
        shell: bash
        env:
          MIX_ENV: ${{ inputs.mix_env }}
        run: |
          set -euo pipefail
          bash -lc "${{ inputs.preflight_command }}"

      - name: Run release
        id: release
        shell: bash
        env:
          MIX_ENV: ${{ inputs.mix_env }}
          VERSION_OVERRIDE: ${{ inputs.version_override }}
        run: |
          set -euo pipefail

          run_release() {
            local escaped_args=""
            if [ "$#" -gt 0 ]; then
              printf -v escaped_args '%q ' "$@"
            fi
            bash -lc "${{ inputs.release_command }} ${escaped_args}"
          }

          dry_run_log="$(mktemp)"
          trap 'rm -f "$dry_run_log"' EXIT

          if [ -n "$VERSION_OVERRIDE" ]; then
            if run_release --override "$VERSION_OVERRIDE" --dry-run >"$dry_run_log" 2>&1; then
              dry_run_status=0
            else
              dry_run_status=$?
            fi
          elif run_release --dry-run >"$dry_run_log" 2>&1; then
            dry_run_status=0
          else
            dry_run_status=$?
          fi

          cat "$dry_run_log"

          if [ -z "$VERSION_OVERRIDE" ] && grep -qE "(No changes since|No changes should result)" "$dry_run_log"; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "No releasable commits found since the last release."
            exit 0
          fi

          if [ "$dry_run_status" -ne 0 ]; then
            exit "$dry_run_status"
          fi

          if [ -n "$VERSION_OVERRIDE" ]; then
            run_release --override "$VERSION_OVERRIDE"
          else
            run_release
          fi

          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Extract release version
        if: ${{ steps.release.outputs.skipped != 'true' }}
        id: version
        uses: ./.github-actions-platform/.github/actions/extract-version

      - name: Prepare release pull request
        if: ${{ steps.release.outputs.skipped != 'true' && inputs.release_push_mode == 'pull-request' && inputs.dry_run != true }}
        id: release-pr
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          branch="release/${RELEASE_VERSION}"
          git switch -c "$branch"
          if git rev-parse "${RELEASE_VERSION}" >/dev/null 2>&1; then
            git tag -d "${RELEASE_VERSION}"
          fi
          git push --set-upstream origin "$branch"
          pr_url="$(gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "$branch" \
            --title "release: ${RELEASE_VERSION}" \
            --body "Automated release preparation for ${RELEASE_VERSION}. Merge this PR, then rerun the release workflow in direct mode to push the tag and publish.")"
          echo "pr-url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Push release commit and tag
        if: ${{ steps.release.outputs.skipped != 'true' && inputs.release_push_mode == 'direct' && inputs.dry_run != true }}
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git push --atomic origin HEAD "refs/tags/${RELEASE_VERSION}"

      - name: Extract changelog notes
        if: ${{ steps.release.outputs.skipped != 'true' && inputs.release_push_mode == 'direct' && inputs.dry_run != true && inputs.release_notes_mode == 'changelog' }}
        id: release-notes
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          bare_version="${RELEASE_VERSION#v}"
          awk -v version="$bare_version" '
            /^## \[v?[0-9]/ {
              if (found) exit
              if (index($0, "[v" version "]") || index($0, "[" version "]")) {
                found = 1
                next
              }
            }
            found {
              if (/^## \[v?[0-9]/) exit
              print
            }
          ' CHANGELOG.md > release_notes.md

          if [ -s release_notes.md ]; then
            echo "has-notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-notes=false" >> "$GITHUB_OUTPUT"
            rm -f release_notes.md
          fi

      - name: Publish to Hex.pm
        if: ${{ steps.release.outputs.skipped != 'true' && inputs.release_push_mode == 'direct' }}
        shell: bash
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: ${{ inputs.mix_env }}
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run }}" = "true" ] || [ "${{ inputs.hex_dry_run }}" = "true" ]; then
            mix hex.publish --dry-run
          else
            mix hex.publish --yes
          fi

      - name: Create GitHub release with changelog notes
        if: ${{ steps.release.outputs.skipped != 'true' && inputs.release_push_mode == 'direct' && inputs.dry_run != true && inputs.release_notes_mode == 'changelog' && steps.release-notes.outputs.has-notes == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_VERSION" \
            --title "Release $RELEASE_VERSION" \
            --notes-file release_notes.md

      - name: Create GitHub release with generated notes
        if: ${{ steps.release.outputs.skipped != 'true' && inputs.release_push_mode == 'direct' && inputs.dry_run != true && (inputs.release_notes_mode == 'generated' || steps.release-notes.outputs.has-notes != 'true') }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_VERSION" \
            --title "Release $RELEASE_VERSION" \
            --generate-notes

      - name: Release summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Release Summary"
            echo "- Skipped: ${{ steps.release.outputs.skipped || 'false' }}"
            echo "- Mode: ${{ inputs.release_push_mode }}"
            echo "- Dry run: ${{ inputs.dry_run }}"
            echo "- Hex dry run: ${{ inputs.hex_dry_run }}"
            if [ -n "${{ steps.version.outputs.version }}" ]; then
              echo "- Version: ${{ steps.version.outputs.version }}"
            fi
            if [ -n "${{ steps.release-pr.outputs.pr-url }}" ]; then
              echo "- Release PR: ${{ steps.release-pr.outputs.pr-url }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
