name: Jido CI

on:
  workflow_call:
    secrets:
      HEX_API_KEY:
        required: false
      WRITEBACK_TOKEN:
        required: false
    inputs:
      quality_otp_version:
        description: OTP version for the quality lane
        required: false
        type: string
        default: "28"
      quality_elixir_version:
        description: Elixir version for the quality lane
        required: false
        type: string
        default: "1.19"
      quality_mix_env:
        description: MIX_ENV for the quality lane
        required: false
        type: string
        default: "dev"
      otp_versions:
        description: JSON array of OTP versions for the test matrix
        required: false
        type: string
        default: '["27", "28"]'
      elixir_versions:
        description: JSON array of Elixir versions for the test matrix
        required: false
        type: string
        default: '["1.18", "1.19"]'
      experimental_compile_elixir_versions:
        description: JSON array of exact compile-only Elixir versions allowed to fail
        required: false
        type: string
        default: "[]"
      experimental_compile_otp_versions:
        description: Optional JSON array of OTP versions for experimental compile checks
        required: false
        type: string
        default: ""
      experimental_compile_otp_name:
        description: Optional label for experimental compile OTP versions
        required: false
        type: string
        default: ""
      test_mix_env:
        description: MIX_ENV for the test lane
        required: false
        type: string
        default: "test"
      test_setup_command:
        description: Optional command that runs before tests
        required: false
        type: string
        default: ""
      test_command:
        description: Test command
        required: false
        type: string
        default: "mix test"
      quality_command:
        description: Optional full replacement quality command
        required: false
        type: string
        default: ""
      changelog_guard:
        description: Enable CHANGELOG.md pull request policy
        required: false
        type: boolean
        default: true
      changelog_guard_mode:
        description: "CHANGELOG.md policy: no_changes or no_unreleased"
        required: false
        type: string
        default: "no_changes"
      validate_hex_package:
        description: Run mix hex.publish --dry-run during pull requests
        required: false
        type: boolean
        default: true
      docs:
        description: Build docs in the quality lane
        required: false
        type: boolean
        default: false
      docs_command:
        description: Documentation build command
        required: false
        type: string
        default: "mix docs"
      sobelow:
        description: Run Sobelow in the quality lane
        required: false
        type: boolean
        default: false
      sobelow_command:
        description: Sobelow command
        required: false
        type: string
        default: "mix sobelow"
      conventional_commits:
        description: Validate the current commit message with git_ops
        required: false
        type: boolean
        default: false
      conventional_commit_command:
        description: Conventional commit validation command
        required: false
        type: string
        default: "mix git_ops.check_message"
      dependency_submission:
        description: Submit dependency graph data on default-branch pushes
        required: false
        type: boolean
        default: false
      credo_sarif:
        description: Upload Credo SARIF results to code scanning
        required: false
        type: boolean
        default: false
      writeback:
        description: Enable automated write-back after successful validation
        required: false
        type: boolean
        default: false
      writeback_command:
        description: Command that produces repo write-back changes
        required: false
        type: string
        default: ""
      writeback_paths:
        description: Space-delimited pathspecs that may be committed by the write-back job
        required: false
        type: string
        default: "."
      writeback_commit_message:
        description: Commit message for automated write-back changes
        required: false
        type: string
        default: "ci: apply automated write-back"
      writeback_branch_mode:
        description: "Write-back mode: pull-request or direct"
        required: false
        type: string
        default: "pull-request"

jobs:
  resolve-platform:
    name: Resolve Platform
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
    outputs:
      repository: ${{ steps.platform.outputs.repository }}
      ref: ${{ steps.platform.outputs.ref }}
      path: ${{ steps.platform.outputs.path }}
    steps:
      - name: Resolve workflow platform ref
        id: platform
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          workflow_path="$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" --jq '.referenced_workflows[0].path // empty')"
          workflow_ref="$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" --jq '.referenced_workflows[0].ref // empty')"
          workflow_sha="$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" --jq '.referenced_workflows[0].sha // empty')"
          if [ -z "$workflow_path" ]; then
            echo "::error::Unable to resolve the reusable workflow repository for run ${{ github.run_id }}."
            exit 1
          fi
          echo "repository=${workflow_path%%/.github/workflows/*}" >> "$GITHUB_OUTPUT"
          echo "ref=${workflow_ref:-$workflow_sha}" >> "$GITHUB_OUTPUT"
          echo "path=.github-actions-platform" >> "$GITHUB_OUTPUT"

  compile:
    name: Compile
    needs: resolve-platform
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout workflow platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ needs.resolve-platform.outputs.repository }}
          ref: ${{ needs.resolve-platform.outputs.ref }}
          path: ${{ needs.resolve-platform.outputs.path }}

      - name: Setup Beam
        uses: ./.github-actions-platform/.github/actions/setup-beam
        with:
          otp-version: ${{ inputs.quality_otp_version }}
          elixir-version: ${{ inputs.quality_elixir_version }}

      - name: Restore caches
        id: cache
        uses: ./.github-actions-platform/.github/actions/restore-mix-cache
        with:
          otp-version: ${{ inputs.quality_otp_version }}
          elixir-version: ${{ inputs.quality_elixir_version }}
          mix-env: test

      - name: Bootstrap Mix
        uses: ./.github-actions-platform/.github/actions/bootstrap-mix

      - name: Install dependencies
        uses: ./.github-actions-platform/.github/actions/install-deps
        with:
          mix-env: test
          deps-cache-hit: ${{ steps.cache.outputs.deps-cache-hit }}

      - name: Compile project
        shell: bash
        env:
          MIX_ENV: test
        run: |
          set -euo pipefail
          mix compile --warnings-as-errors

  quality:
    name: Quality
    needs:
      - resolve-platform
      - compile
    uses: ./.github/workflows/elixir-quality.yml
    permissions:
      contents: read
    secrets:
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
    with:
      otp_version: ${{ inputs.quality_otp_version }}
      elixir_version: ${{ inputs.quality_elixir_version }}
      mix_env: ${{ inputs.quality_mix_env }}
      quality_command: ${{ inputs.quality_command }}
      changelog_guard: ${{ inputs.changelog_guard }}
      changelog_guard_mode: ${{ inputs.changelog_guard_mode }}
      validate_hex_package: ${{ inputs.validate_hex_package }}
      docs: ${{ inputs.docs }}
      docs_command: ${{ inputs.docs_command }}
      sobelow: ${{ inputs.sobelow }}
      sobelow_command: ${{ inputs.sobelow_command }}
      conventional_commits: ${{ inputs.conventional_commits }}
      conventional_commit_command: ${{ inputs.conventional_commit_command }}
      credo_sarif: false
      workflow_platform_repository: ${{ needs.resolve-platform.outputs.repository }}
      workflow_platform_ref: ${{ needs.resolve-platform.outputs.ref }}
      workflow_platform_path: ${{ needs.resolve-platform.outputs.path }}

  test:
    name: Test
    needs:
      - resolve-platform
      - compile
    uses: ./.github/workflows/elixir-test.yml
    permissions:
      contents: read
    with:
      otp_versions: ${{ inputs.otp_versions }}
      elixir_versions: ${{ inputs.elixir_versions }}
      experimental_compile_elixir_versions: ${{ inputs.experimental_compile_elixir_versions }}
      experimental_compile_otp_versions: ${{ inputs.experimental_compile_otp_versions }}
      experimental_compile_otp_name: ${{ inputs.experimental_compile_otp_name }}
      mix_env: ${{ inputs.test_mix_env }}
      test_setup_command: ${{ inputs.test_setup_command }}
      test_command: ${{ inputs.test_command }}
      workflow_platform_repository: ${{ needs.resolve-platform.outputs.repository }}
      workflow_platform_ref: ${{ needs.resolve-platform.outputs.ref }}
      workflow_platform_path: ${{ needs.resolve-platform.outputs.path }}

  credo-sarif:
    name: Credo SARIF
    needs:
      - resolve-platform
      - compile
    if: ${{ inputs.credo_sarif && inputs.quality_command == '' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout workflow platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ needs.resolve-platform.outputs.repository }}
          ref: ${{ needs.resolve-platform.outputs.ref }}
          path: ${{ needs.resolve-platform.outputs.path }}

      - name: Setup Beam
        uses: ./.github-actions-platform/.github/actions/setup-beam
        with:
          otp-version: ${{ inputs.quality_otp_version }}
          elixir-version: ${{ inputs.quality_elixir_version }}

      - name: Restore caches
        id: cache
        uses: ./.github-actions-platform/.github/actions/restore-mix-cache
        with:
          otp-version: ${{ inputs.quality_otp_version }}
          elixir-version: ${{ inputs.quality_elixir_version }}
          mix-env: ${{ inputs.quality_mix_env }}

      - name: Bootstrap Mix
        uses: ./.github-actions-platform/.github/actions/bootstrap-mix

      - name: Install dependencies
        uses: ./.github-actions-platform/.github/actions/install-deps
        with:
          mix-env: ${{ inputs.quality_mix_env }}
          deps-cache-hit: ${{ steps.cache.outputs.deps-cache-hit }}

      - name: Run Credo SARIF
        shell: bash
        env:
          MIX_ENV: ${{ inputs.quality_mix_env }}
        run: |
          set -euo pipefail
          mix credo --format sarif > results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@0499de31b99561a6d14a36a5f662c2a54f91beee # v4.31.2
        with:
          sarif_file: results.sarif
          category: credo

  dependency-submission:
    name: Dependency Submission
    if: ${{ inputs.dependency_submission && github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Submit Mix dependencies
        uses: erlef/mix-dependency-submission@fa3e8f349d00a32bf14eec1c7577d6564abe08d2 # v1.3.1

  writeback:
    name: Write-Back
    needs:
      - resolve-platform
      - quality
      - test
    if: ${{ inputs.writeback && inputs.writeback_command != '' && github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: writeback-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Validate write-back mode
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.writeback_branch_mode }}" in
            pull-request|direct) ;;
            *)
              echo "::error::Unsupported writeback_branch_mode: ${{ inputs.writeback_branch_mode }}"
              exit 1
              ;;
          esac

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.WRITEBACK_TOKEN != '' && secrets.WRITEBACK_TOKEN || github.token }}

      - name: Checkout workflow platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ needs.resolve-platform.outputs.repository }}
          ref: ${{ needs.resolve-platform.outputs.ref }}
          path: ${{ needs.resolve-platform.outputs.path }}

      - name: Setup Beam
        uses: ./.github-actions-platform/.github/actions/setup-beam
        with:
          otp-version: ${{ inputs.quality_otp_version }}
          elixir-version: ${{ inputs.quality_elixir_version }}

      - name: Restore caches
        id: cache
        uses: ./.github-actions-platform/.github/actions/restore-mix-cache
        with:
          otp-version: ${{ inputs.quality_otp_version }}
          elixir-version: ${{ inputs.quality_elixir_version }}
          mix-env: ${{ inputs.quality_mix_env }}

      - name: Bootstrap Mix
        uses: ./.github-actions-platform/.github/actions/bootstrap-mix

      - name: Install dependencies
        uses: ./.github-actions-platform/.github/actions/install-deps
        with:
          mix-env: ${{ inputs.quality_mix_env }}
          deps-cache-hit: ${{ steps.cache.outputs.deps-cache-hit }}

      - name: Run write-back command
        shell: bash
        env:
          MIX_ENV: ${{ inputs.quality_mix_env }}
        run: |
          set -euo pipefail
          ${{ inputs.writeback_command }}

      - name: Detect write-back changes
        id: changes
        shell: bash
        env:
          WRITEBACK_PATHS: ${{ inputs.writeback_paths }}
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain --untracked-files=all -- ${WRITEBACK_PATHS})" ]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: ${{ steps.changes.outputs.has-changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create write-back pull request
        if: ${{ steps.changes.outputs.has-changes == 'true' && inputs.writeback_branch_mode == 'pull-request' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.WRITEBACK_TOKEN != '' && secrets.WRITEBACK_TOKEN || github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WRITEBACK_PATHS: ${{ inputs.writeback_paths }}
          WRITEBACK_COMMIT_MESSAGE: ${{ inputs.writeback_commit_message }}
        run: |
          set -euo pipefail
          branch="automation/writeback-${{ github.run_id }}-${{ github.run_attempt }}"
          git switch -c "$branch"
          git add --all -- ${WRITEBACK_PATHS}
          git commit -m "$WRITEBACK_COMMIT_MESSAGE"
          git push --set-upstream origin "$branch"
          gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "$branch" \
            --title "$WRITEBACK_COMMIT_MESSAGE" \
            --body "Automated write-back generated by the reusable Jido CI workflow."

      - name: Push write-back directly
        if: ${{ steps.changes.outputs.has-changes == 'true' && inputs.writeback_branch_mode == 'direct' }}
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WRITEBACK_PATHS: ${{ inputs.writeback_paths }}
          WRITEBACK_COMMIT_MESSAGE: ${{ inputs.writeback_commit_message }}
        run: |
          set -euo pipefail
          git add --all -- ${WRITEBACK_PATHS}
          git commit -m "$WRITEBACK_COMMIT_MESSAGE"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Summarize write-back
        if: always()
        shell: bash
        run: |
          echo "### Write-back" >> "$GITHUB_STEP_SUMMARY"
          echo "- Enabled: true" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: ${{ inputs.writeback_branch_mode }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Changes detected: ${{ steps.changes.outputs.has-changes || 'false' }}" >> "$GITHUB_STEP_SUMMARY"

  summary:
    name: Summary
    if: always()
    needs:
      - compile
      - quality
      - test
      - credo-sarif
      - dependency-submission
      - writeback
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Report CI summary
        shell: bash
        run: |
          {
            echo "## Jido CI Summary"
            echo "- Compile: ${{ needs.compile.result }}"
            echo "- Quality: ${{ needs.quality.result }}"
            echo "- Test: ${{ needs.test.result }}"
            echo "- Credo SARIF: ${{ needs.credo-sarif.result }}"
            echo "- Dependency submission: ${{ needs.dependency-submission.result }}"
            echo "- Write-back: ${{ needs.writeback.result }}"
            echo "- Quality toolchain: OTP ${{ inputs.quality_otp_version }}, Elixir ${{ inputs.quality_elixir_version }}"
            echo "- Test matrix OTPs: ${{ inputs.otp_versions }}"
            echo "- Test matrix Elixirs: ${{ inputs.elixir_versions }}"
            echo "- Docs: ${{ inputs.docs }}"
            echo "- Sobelow: ${{ inputs.sobelow }}"
            echo "- Credo SARIF: ${{ inputs.credo_sarif }}"
          } >> "$GITHUB_STEP_SUMMARY"
