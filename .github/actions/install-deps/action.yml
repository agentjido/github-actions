name: Install Mix Dependencies
description: Restore dependencies with optional compile and cache cleanup.

inputs:
  mix-env:
    description: MIX_ENV used while compiling dependencies
    required: false
    default: test
  deps-cache-hit:
    description: Whether the deps/_build cache was restored
    required: false
    default: ""
  deps-get-command:
    description: Command used to fetch dependencies
    required: false
    default: mix deps.get
  deps-compile-command:
    description: Command used to compile dependencies
    required: false
    default: mix deps.compile
  compile-deps:
    description: Whether to compile dependencies when cache is cold
    required: false
    default: "true"
  deps-compile-partition-count:
    description: Number of OS processes used by mix deps.compile; auto uses the runner CPU count
    required: false
    default: auto
  prune-rebar-artifacts:
    description: Remove stale rebar artifacts on cache miss
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Remove stale rebar artifacts
      if: ${{ inputs.prune-rebar-artifacts == 'true' && inputs.deps-cache-hit != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        if [ -d deps ]; then
          find deps -maxdepth 6 -type d \( -name _build -o -name .rebar3 \) -prune -exec rm -rf {} + || true
          find deps -maxdepth 6 -type f -name rebar3.crashdump -delete || true
        fi

    - name: Fetch dependencies
      shell: bash
      run: |
        set -euo pipefail
        ${{ inputs.deps-get-command }}

    - name: Compile dependencies
      if: ${{ inputs.compile-deps == 'true' && inputs.deps-cache-hit != 'true' }}
      shell: bash
      env:
        MIX_ENV: ${{ inputs.mix-env }}
        DEPS_COMPILE_PARTITION_COUNT: ${{ inputs.deps-compile-partition-count }}
      run: |
        set -uo pipefail

        partition_count="$DEPS_COMPILE_PARTITION_COUNT"
        if [ "$partition_count" = "auto" ] || [ -z "$partition_count" ]; then
          if command -v nproc >/dev/null 2>&1; then
            partition_count="$(nproc)"
          elif command -v getconf >/dev/null 2>&1; then
            partition_count="$(getconf _NPROCESSORS_ONLN || true)"
          elif command -v sysctl >/dev/null 2>&1; then
            partition_count="$(sysctl -n hw.ncpu || true)"
          fi
        fi

        case "$partition_count" in
          ''|*[!0-9]*)
            echo "::warning::Invalid deps compile partition count '$DEPS_COMPILE_PARTITION_COUNT'; defaulting to 1."
            partition_count=1
            ;;
        esac

        if [ "$partition_count" -lt 1 ]; then
          partition_count=1
        fi

        export MIX_OS_DEPS_COMPILE_PARTITION_COUNT="$partition_count"
        echo "Using MIX_OS_DEPS_COMPILE_PARTITION_COUNT=$MIX_OS_DEPS_COMPILE_PARTITION_COUNT"

        echo "::remove-matcher owner=elixir-mixCompileWarning::"
        ${{ inputs.deps-compile-command }}
        status="$?"
        echo "::add-matcher::$GITHUB_ACTION_PATH/elixir-compile-warning-matcher.json"
        exit "$status"
